 <!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1 minimum-scale=1.0, user-scalable=0">
    
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
      <script src="js/jquery.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'New Rocker', cursive;
    }
    h1,input{
      text-shadow: 2px 2px 10px  black;
      color:rgba(87,255,19,0.725);
    }
    img{
      height: 200px;
      min-width: 200px;
      padding: 2%;
      border: 2px solid red;
    }
    input{
      margin-bottom: 5px;
    }
  
    
     .rounded-circle{
    
    width:50px;
    height:50px;
    text-align:center;
    display:flex;
    column-count:1;
    left:25%;
    
    animation:move 3s linear infinite;
    animation-direction:alternate;
    
    z-index:99;
    
 }
      
      
      @keyframes move{
    from{
    padding-left:50px;
    padding-top:50px;
    opacity:.7;
    
    }
    to{padding-left:150px;
    padding-top:150px;
    opacity:1;
    }
    
    }   
   .bb{
    height:50vh;
    border:2px solid blue;
    padding:20%;
    width:100%;
    align-items:center;
    justify-content:center;
    display:flex;
    background-color:green;
    }
    </style>
  
  </head>
  <body>
    <input type="button"  class="btn btn-danger m-auto p-auto" id="back" value="back"/> 
    <h1 class="text-light text-center "> My first API Project </h1>
      <h1 class="  display-md-4 text-center text-dark">What Does Your Name Say About Your Presonatily </h1>
    <section class="container bg-warning p-5 row d-flex justify-content-center align-item-center m-auto " style=" column:1;">
      <h1 class="fs-2 text-center"> Enter Your Name</h1>
   
   <div class=" w-50">
     <input type="text" class="form-control  my-3 text-danger mx-auto "  id="myinput"   placeholder="enter your name"/><br /><br />
   </div>
   
    <img id="myimg" src="img/Wc.jpg" alt="" class=" h-25 bg-success rounded w-75"/><br />
    <div class=" w-50 mx-auto text-center my-auto">
      
    <button type="button" class="btn text-center  btn-primary w-auto h-auto m-5 smt">click</button>
    </div>
    
    </section>
    
    

  <div class="bb" >
 	 <div class=" bg-warning text-center mx-5 my-5 rounded-circle"><br></div>
  </div>
    
    
    <script>
      $(document).ready(function(){
        $('.smt').click(function(){
        const name =   $('#myinput').val();
        $('#myimg').attr('src', `https://joeschmoe.io/api/v1/${name}`);
        });
      });
    $('#back').click(function(){
      window.history.go(-1)
    });
    </script>
  </body>
</html>
